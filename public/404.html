<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found - C&K Amsterdam</title>
    <link rel="icon" type="image/png" href="img/logo1.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200..700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Raleway", sans-serif;
        color: #2a2a2a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 24px;
      }
      .code {
        font-size: 120px;
        font-weight: 200;
        letter-spacing: 6px;
        color: #ddd;
        line-height: 1;
        margin-bottom: 16px;
      }
      .message {
        font-size: 20px;
        font-weight: 300;
        color: #888;
        margin-bottom: 40px;
      }
      .home {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-decoration: none;
        color: #aaa;
        border-bottom: 1px solid #ddd;
        padding-bottom: 2px;
        transition: color 0.3s, border-color 0.3s;
      }
      .home:hover {
        color: #2a2a2a;
        border-color: #2a2a2a;
      }
    </style>
  </head>
  <body>
    <div class="code">404</div>
    <p class="message">This page doesn't exist.</p>
    <a href="/" class="home">Back to home</a>
  </body>
</html>
